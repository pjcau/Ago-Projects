version: '3.8'

services:
  # ── Frontend (production via Nginx) ──
  web:
    build: 
      context: ./apps/01
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - api

  # ── Frontend (development with hot-reload) ──
  dev:
    build:
      context: ./apps/01
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/01:/app
      - /app/node_modules
      - /app/build
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=true
      - WATCHPACK_POLLING=true
    command: npm start
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - api

  # ── Backend API (FastAPI) ──
  api:
    build:
      context: ./apps/01/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s